name: PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # Required check: structure and format compliance
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-haiku-4-5
            --max-turns 15
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr merge:*),Bash(gh pr review:*),Read,Glob,Grep"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the STRUCTURE check for this PR. Only check format and structure,
            do NOT verify data accuracy (a separate job handles that).

            Run `gh pr diff` to see the changes. Read pinout_template.md and CONTRIBUTING.md.

            Check every changed file against:
            - Correct directory (boards/, displays/, sensors/)
            - Lowercase dash-separated filename
            - Follows pinout_template.md structure
            - Has Source: URL or Source: TODO
            - ASCII diagram orientation (USB north for boards, pin header top for peripherals)
            - No wiring tables in pinout files
            - No images committed
            - Board files have Bus Defaults section

            For skill.md changes: YAML frontmatter present, no local paths, WIRING_FORMAT.md in sync.

            Post your findings with `gh pr review`:
            - Pass: `gh pr review --approve --body "Structure check passed. <summary>"`
            - Fail: `gh pr review --request-changes --body "Structure issues found: <details>"`

            After approving, merge with: `gh pr merge --squash --auto`

  # Best-effort check: verify pinout data against sources
  data-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-haiku-4-5
            --max-turns 15
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep,WebFetch,WebSearch,Bash(curl:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the DATA VERIFICATION check. A separate job checks structure.
            Your only job is to verify the pinout data is electrically accurate.

            Run `gh pr diff` to see what pinout files changed.

            For each changed pinout file:
            1. Find the Source URL in the file. If Source: TODO, search the web for
               the component's official datasheet or product page.
            2. Fetch the source and cross-check: pin names, pin order, I2C addresses,
               SPI modes, voltage levels, bus default assignments.
            3. Note any discrepancies.

            Post a single comment with `gh pr comment --body "..."` containing:
            - Which sources you checked (with URLs)
            - Any discrepancies found (these can damage hardware if wrong)
            - A verdict: "Data looks correct" or "Data issues found: ..."

            Do NOT approve or merge -- the structure check handles that.
            If you can't verify (no source available), say so.
