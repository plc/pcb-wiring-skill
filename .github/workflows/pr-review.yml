name: PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 10"
          prompt: |
            Review this pull request against the project's contribution standards.

            This repo stores component pinout data (boards, displays, sensors) as markdown
            files, plus a Claude Code skill definition (skill.md). Most PRs will add or edit
            pinout files.

            ## Review checklist

            For pinout file changes, verify:
            1. File is in the correct directory (boards/, displays/, sensors/, etc.)
            2. File naming: lowercase, dashes, includes key identifiers
            3. Follows the structure in pinout_template.md
            4. Source link is present (URL or "TODO" is acceptable)
            5. ASCII diagram uses correct orientation (USB north for boards, pin header at top for peripherals)
            6. Position notation matches convention (L1-L7, R1-R7 for physical pin positions)
            7. Board files include a Bus Defaults section (I2C, SPI, UART pin assignments)
            8. No wiring tables in pinout files (wiring is computed at runtime by the skill)
            9. No images committed to the repo

            For skill.md changes, verify:
            10. YAML frontmatter is present with name and description
            11. No hardcoded local paths (must use GitHub raw URLs)
            12. If WIRING_FORMAT.md content changed, the inlined copy in skill.md is also updated

            For any changes:
            13. No unrelated or unnecessary changes
            14. Commit messages are clear

            ## Actions

            - If the PR meets all applicable criteria: approve it and leave a short summary
              of what was added/changed.
            - If there are issues: request changes with specific, actionable feedback
              referencing the checklist items above. Be direct about what needs fixing.
            - For minor issues (e.g. Source: TODO is fine per guidelines): approve but
              mention them as suggestions, not blockers.

            After approving, if the PR has no failing checks and no merge conflicts,
            merge it using: gh pr merge --squash --auto
