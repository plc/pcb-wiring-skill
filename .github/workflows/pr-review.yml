name: PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 50
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr merge:*),Bash(gh pr review:*),Bash(curl:*),Read,Glob,Grep,WebFetch,WebSearch"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for a pinout data repository.

            Read the diff with `gh pr diff`, then read pinout_template.md and
            CONTRIBUTING.md. Check the changed files against these rules:

            - Correct directory (boards/, displays/, sensors/)
            - Lowercase dash-separated filename
            - Follows pinout_template.md structure
            - Has Source: URL or Source: TODO
            - ASCII diagram orientation correct (USB north for boards)
            - No wiring tables in pinout files
            - No images committed
            - Board files have Bus Defaults

            If a source URL is in the file, fetch it and spot-check that the pin
            names and order match. Flag inaccurate pin data as a blocker.

            Post your review using `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` with
            `confirmed: true` for line-specific issues.

            If the PR passes review, approve it with:
              gh pr review --approve --body "your summary"
            Then merge:
              gh pr merge --squash --auto
